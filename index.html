<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blobify Webcam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

  #controls {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px 20px;
    color: #fff;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    min-width: 230px;
    user-select: none;
    z-index: 10;
  }
  #controls h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; letter-spacing: .04em; opacity: .9; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
  .row label { flex: 0 0 auto; opacity: .8; white-space: nowrap; }
  .row .val { flex: 0 0 34px; text-align: right; font-variant-numeric: tabular-nums; opacity: .65; font-size: 12px; }
  input[type=range] { flex: 1; accent-color: #7df; cursor: pointer; }
  .row select {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    padding: 2px 6px;
    font-size: 12px;
    cursor: pointer;
  }

  #status {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-family: system-ui, sans-serif;
    font-size: 13px;
    pointer-events: none;
  }
  #controls h2 { display: flex; align-items: center; justify-content: space-between; }
  #chevron {
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: transform 0.2s;
  }
  #chevron.collapsed { transform: rotate(-90deg); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="controls">
  <h2>Blobify <button id="chevron" title="Collapse">&#8964;</button></h2>
  <div id="control-body">
  <div class="row">
    <label>Palette size</label>
    <input type="range" id="paletteSize" min="2" max="64" value="32" step="1">
    <span class="val" id="paletteSizeVal">32</span>
  </div>
  <div class="row">
    <label>Blobiness</label>
    <input type="range" id="iterations" min="0" max="200" value="30" step="1">
    <span class="val" id="iterationsVal">30</span>
  </div>
  <div class="row">
    <label>Smart palette</label>
    <input type="checkbox" id="smartPalette" checked style="width:auto;accent-color:#7df;cursor:pointer;">
  </div>
  <div class="row">
    <label>Dither</label>
    <select id="ditherMode">
      <option value="nearest">Nearest</option>
      <option value="ordered">Ordered (Bayer)</option>
    </select>
  </div>
  </div>
</div>

<div id="status">Waiting for webcam…</div>

<script>
// ── Shaders ────────────────────────────────────────────────────────────────

const VERT = `
attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;

// Uniform RGB-cube dither (ordered or nearest)
const DITHER_FRAG = `
precision mediump float;
uniform sampler2D u_image;
uniform vec2 u_resolution;
uniform float u_paletteSize;
uniform int u_ditherMode;
varying vec2 v_texCoord;

const mat4 bayer0 = mat4(0.,32.,8.,40., 48.,16.,56.,24., 12.,44.,4.,36., 60.,28.,52.,20.);
const mat4 bayer1 = mat4(2.,34.,10.,42., 50.,18.,58.,26., 14.,46.,6.,38., 62.,30.,54.,22.);

float getBayer(vec2 pos) {
  int x=int(mod(pos.x,8.0)), y=int(mod(pos.y,8.0));
  int row=int(mod(float(y),4.0)), col=int(mod(float(x),4.0));
  mat4 m=(int(mod(floor(float(x)/4.0),2.0))==0)?bayer0:bayer1;
  if(row==0){if(col==0)return m[0][0];if(col==1)return m[0][1];if(col==2)return m[0][2];return m[0][3];}
  else if(row==1){if(col==0)return m[1][0];if(col==1)return m[1][1];if(col==2)return m[1][2];return m[1][3];}
  else if(row==2){if(col==0)return m[2][0];if(col==1)return m[2][1];if(col==2)return m[2][2];return m[2][3];}
  else{if(col==0)return m[3][0];if(col==1)return m[3][1];if(col==2)return m[3][2];return m[3][3];}
}

void main() {
  vec4 color = texture2D(u_image, v_texCoord);
  float lpc = ceil(pow(u_paletteSize, 1.0/3.0));
  float steps = max(lpc-1.0, 1.0);
  vec3 d;
  if (u_ditherMode == 1) {
    d = floor(color.rgb * steps + 0.5) / steps;
  } else {
    float t = getBayer(v_texCoord * u_resolution) / 64.0;
    d = color.rgb + (t-0.5)/steps;
    d = floor(d*steps+0.5)/steps;
  }
  gl_FragColor = vec4(clamp(d,0.0,1.0), color.a);
}`;

// Adaptive palette dither — nearest color search in a palette texture
const ADAPTIVE_DITHER_FRAG = `
precision mediump float;
uniform sampler2D u_image;
uniform vec2 u_resolution;
uniform sampler2D u_palette;
uniform int u_paletteCount;
uniform int u_ditherMode;
varying vec2 v_texCoord;

const mat4 bayer0 = mat4(0.,32.,8.,40., 48.,16.,56.,24., 12.,44.,4.,36., 60.,28.,52.,20.);
const mat4 bayer1 = mat4(2.,34.,10.,42., 50.,18.,58.,26., 14.,46.,6.,38., 62.,30.,54.,22.);

float getBayer(vec2 pos) {
  int x=int(mod(pos.x,8.0)), y=int(mod(pos.y,8.0));
  int row=int(mod(float(y),4.0)), col=int(mod(float(x),4.0));
  mat4 m=(int(mod(floor(float(x)/4.0),2.0))==0)?bayer0:bayer1;
  if(row==0){if(col==0)return m[0][0];if(col==1)return m[0][1];if(col==2)return m[0][2];return m[0][3];}
  else if(row==1){if(col==0)return m[1][0];if(col==1)return m[1][1];if(col==2)return m[1][2];return m[1][3];}
  else if(row==2){if(col==0)return m[2][0];if(col==1)return m[2][1];if(col==2)return m[2][2];return m[2][3];}
  else{if(col==0)return m[3][0];if(col==1)return m[3][1];if(col==2)return m[3][2];return m[3][3];}
}

void main() {
  vec4 color = texture2D(u_image, v_texCoord);
  vec3 rgb = color.rgb;

  if (u_ditherMode == 0) {
    float t = getBayer(v_texCoord * u_resolution) / 64.0;
    float amp = 0.5 / pow(max(float(u_paletteCount), 1.0), 1.0/3.0);
    rgb = clamp(rgb + (t-0.5)*amp, 0.0, 1.0);
  }

  vec3 best = rgb;
  float bestDist = 1.0e9;
  for (int i = 0; i < 256; i++) {
    if (i >= u_paletteCount) break;
    vec3 entry = texture2D(u_palette, vec2((float(i)+0.5)/256.0, 0.5)).rgb;
    vec3 d = entry - rgb;
    float dist = dot(d, d);
    if (dist < bestDist) { bestDist = dist; best = entry; }
  }
  gl_FragColor = vec4(best, color.a);
}`;

// Majority-vote cellular automaton (blobifier)
const AUTOMATON_FRAG = `
precision mediump float;
uniform sampler2D u_state;
uniform vec2 u_resolution;
uniform float u_random;
varying vec2 v_texCoord;

vec3 nb(float dx, float dy) {
  return texture2D(u_state, clamp(v_texCoord+vec2(dx,dy)/u_resolution, vec2(0.0), vec2(1.0))).rgb;
}
float rand(vec2 co) { return fract(sin(dot(co,vec2(12.9898,78.233))+u_random)*43758.5453); }
bool eq(vec3 a,vec3 b) { return distance(a,b)<0.01; }

void main() {
  vec3 ns[8];
  ns[0]=nb(-1.,-1.); ns[1]=nb(0.,-1.); ns[2]=nb(1.,-1.); ns[3]=nb(-1.,0.);
  ns[4]=nb(1.,0.);   ns[5]=nb(-1.,1.); ns[6]=nb(0.,1.);  ns[7]=nb(1.,1.);

  vec3 uc[8]; float cnt[8]; float nu=0.0;
  for(int i=0;i<8;i++){cnt[i]=0.0;uc[i]=vec3(0.);}

  for(int i=0;i<8;i++){
    vec3 c=ns[i]; bool found=false;
    for(int j=0;j<8;j++){
      if(float(j)<nu&&eq(c,uc[j])){cnt[j]+=1.0;found=true;break;}
    }
    if(!found&&nu<8.0){
      int k=int(nu);
      if(k==0){uc[0]=c;cnt[0]=1.0;}else if(k==1){uc[1]=c;cnt[1]=1.0;}
      else if(k==2){uc[2]=c;cnt[2]=1.0;}else if(k==3){uc[3]=c;cnt[3]=1.0;}
      else if(k==4){uc[4]=c;cnt[4]=1.0;}else if(k==5){uc[5]=c;cnt[5]=1.0;}
      else if(k==6){uc[6]=c;cnt[6]=1.0;}else if(k==7){uc[7]=c;cnt[7]=1.0;}
      nu+=1.0;
    }
  }

  float mx=0.0;
  for(int i=0;i<8;i++) if(float(i)<nu) mx=max(mx,cnt[i]);

  vec3 mc[8]; float nm=0.0;
  for(int i=0;i<8;i++) mc[i]=vec3(0.);
  for(int i=0;i<8;i++){
    if(float(i)<nu&&cnt[i]==mx){
      int k=int(nm);
      if(k==0)mc[0]=uc[i];else if(k==1)mc[1]=uc[i];else if(k==2)mc[2]=uc[i];else if(k==3)mc[3]=uc[i];
      else if(k==4)mc[4]=uc[i];else if(k==5)mc[5]=uc[i];else if(k==6)mc[6]=uc[i];else if(k==7)mc[7]=uc[i];
      nm+=1.0;
    }
  }

  vec3 sel=mc[0];
  if(nm>1.0){
    int si=int(floor(rand(v_texCoord)*nm));
    if(si==0)sel=mc[0];else if(si==1)sel=mc[1];else if(si==2)sel=mc[2];else if(si==3)sel=mc[3];
    else if(si==4)sel=mc[4];else if(si==5)sel=mc[5];else if(si==6)sel=mc[6];else if(si==7)sel=mc[7];
  }
  gl_FragColor = vec4(sel, 1.0);
}`;

// Copy/blit: contains-fit with horizontal mirror and Y-flip correction
const COPY_FRAG = `
precision mediump float;
uniform sampler2D u_tex;
uniform vec2 u_canvasSize;
uniform vec2 u_videoSize;
varying vec2 v_texCoord;
void main() {
  float cAR = u_canvasSize.x / u_canvasSize.y;
  float vAR = u_videoSize.x  / u_videoSize.y;
  vec2 uv = v_texCoord;
  if (cAR > vAR) { float s=vAR/cAR; uv.x=(uv.x-0.5)/s+0.5; }
  else            { float s=cAR/vAR; uv.y=(uv.y-0.5)/s+0.5; }
  if (uv.x<0.0||uv.x>1.0||uv.y<0.0||uv.y>1.0) {
    gl_FragColor=vec4(0.0,0.0,0.0,1.0); return;
  }
  uv.x = 1.0 - uv.x;   // mirror (selfie feel)
  uv.y = 1.0 - uv.y;   // fix WebGL Y-flip from video upload
  gl_FragColor = texture2D(u_tex, uv);
}`;

// ── WebGL init ─────────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.getElementById('status').textContent = 'WebGL not supported'; throw new Error(); }

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function makeProgram(vert, frag) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vert, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(frag, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

const ditherProg   = makeProgram(VERT, DITHER_FRAG);
const adaptiveProg = makeProgram(VERT, ADAPTIVE_DITHER_FRAG);
const automatonProg= makeProgram(VERT, AUTOMATON_FRAG);
const copyProg     = makeProgram(VERT, COPY_FRAG);

const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function makeTex() {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  return t;
}
function makeFbo(tex, w, h) {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return fbo;
}

let W=0, H=0, inputTex, pingTex, pongTex, pingFbo, pongFbo, paletteTex;

function initBuffers(w, h) {
  if (inputTex) { [inputTex, pingTex, pongTex, paletteTex].forEach(t=>gl.deleteTexture(t)); }
  W=w; H=h;
  inputTex   = makeTex();
  pingTex    = makeTex();
  pongTex    = makeTex();
  paletteTex = makeTex();
  pingFbo = makeFbo(pingTex, w, h);
  pongFbo = makeFbo(pongTex, w, h);
  // Allocate input texture
  gl.bindTexture(gl.TEXTURE_2D, inputTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  // Allocate 256x1 palette texture
  gl.bindTexture(gl.TEXTURE_2D, paletteTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
}

function bindQuad(prog) {
  const loc = gl.getAttribLocation(prog, 'a_position');
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

function runPass(prog, srcTex, dstFbo, setU) {
  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  setU(prog);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dstFbo);
  gl.viewport(0, 0, W, H);
  bindQuad(prog);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ── Adaptive palette via k-means ───────────────────────────────────────────

const thumbCanvas = document.createElement('canvas');
const thumbCtx    = thumbCanvas.getContext('2d', { willReadFrequently: true });
const THUMB_W = 80, THUMB_H = 45;
thumbCanvas.width = THUMB_W; thumbCanvas.height = THUMB_H;

let paletteData = new Uint8Array(256 * 4);
let paletteCount = 0;
// Persistent centroids — warm-started each frame so palette drifts smoothly
let centroids = [];

function extractPalette(video, k) {
  thumbCtx.drawImage(video, 0, 0, THUMB_W, THUMB_H);
  const px = thumbCtx.getImageData(0, 0, THUMB_W, THUMB_H).data;
  const n = THUMB_W * THUMB_H;

  const samples = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    samples[i*3  ] = px[i*4  ] / 255;
    samples[i*3+1] = px[i*4+1] / 255;
    samples[i*3+2] = px[i*4+2] / 255;
  }

  // Warm-start: reuse previous centroids; add random samples for any new slots
  if (centroids.length !== k) {
    centroids = [];
    const picked = new Set();
    while (centroids.length < k) {
      const idx = Math.floor(Math.random() * n);
      if (!picked.has(idx)) {
        picked.add(idx);
        centroids.push([samples[idx*3], samples[idx*3+1], samples[idx*3+2]]);
      }
    }
  }

  // K-means iterations (fewer needed since we warm-start)
  const assign = new Int32Array(n);
  for (let iter = 0; iter < 5; iter++) {
    for (let i = 0; i < n; i++) {
      let best = 0, bestDist = Infinity;
      for (let c = 0; c < k; c++) {
        const dr = samples[i*3  ]-centroids[c][0];
        const dg = samples[i*3+1]-centroids[c][1];
        const db = samples[i*3+2]-centroids[c][2];
        const d = dr*dr + dg*dg + db*db;
        if (d < bestDist) { bestDist = d; best = c; }
      }
      assign[i] = best;
    }
    const sums = Array.from({length:k}, ()=>[0,0,0,0]);
    for (let i = 0; i < n; i++) {
      const c = assign[i];
      sums[c][0] += samples[i*3]; sums[c][1] += samples[i*3+1];
      sums[c][2] += samples[i*3+2]; sums[c][3]++;
    }
    for (let c = 0; c < k; c++) {
      if (sums[c][3] > 0) {
        centroids[c][0] = sums[c][0]/sums[c][3];
        centroids[c][1] = sums[c][1]/sums[c][3];
        centroids[c][2] = sums[c][2]/sums[c][3];
      }
    }
  }

  // Lerp palette toward new centroids for smooth temporal transition
  const LERP = 0.25;
  for (let c = 0; c < k; c++) {
    const pr = paletteData[c*4  ] / 255;
    const pg = paletteData[c*4+1] / 255;
    const pb = paletteData[c*4+2] / 255;
    paletteData[c*4  ] = Math.round((pr*(1-LERP) + centroids[c][0]*LERP)*255);
    paletteData[c*4+1] = Math.round((pg*(1-LERP) + centroids[c][1]*LERP)*255);
    paletteData[c*4+2] = Math.round((pb*(1-LERP) + centroids[c][2]*LERP)*255);
    paletteData[c*4+3] = 255;
  }
  paletteCount = k;

  gl.bindTexture(gl.TEXTURE_2D, paletteTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, paletteData);
}

// ── Webcam ─────────────────────────────────────────────────────────────────

const video = document.createElement('video');
video.autoplay = true; video.playsInline = true; video.muted = true;
const status = document.getElementById('status');

navigator.mediaDevices.getUserMedia({ video: { width:{ideal:1280}, height:{ideal:720} } })
  .then(stream => {
    video.srcObject = stream;
    video.play().catch(()=>{});
    function start() {
      if (W > 0) return;
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return;
      status.textContent = '';
      initBuffers(vw, vh);
      requestAnimationFrame(loop);
    }
    video.addEventListener('playing',    start, { once: true });
    video.addEventListener('loadeddata', start, { once: true });
  })
  .catch(err => { status.textContent = 'Webcam error: ' + err.message; });

// ── Controls ───────────────────────────────────────────────────────────────

const opts = { paletteSize: 32, iterations: 30, ditherMode: 'nearest', smartPalette: true };

function linkSlider(id, valId, key) {
  const el = document.getElementById(id), vl = document.getElementById(valId);
  vl.textContent = el.value;
  el.addEventListener('input', () => { vl.textContent = el.value; opts[key] = Number(el.value); });
}
linkSlider('paletteSize', 'paletteSizeVal', 'paletteSize');
document.getElementById('paletteSize').addEventListener('input', () => { centroids = []; });
linkSlider('iterations',  'iterationsVal',  'iterations');
document.getElementById('ditherMode').addEventListener('change', e => { opts.ditherMode = e.target.value; });
document.getElementById('smartPalette').addEventListener('change', e => { opts.smartPalette = e.target.checked; centroids = []; });

document.getElementById('chevron').addEventListener('click', () => {
  const body = document.getElementById('control-body');
  const btn  = document.getElementById('chevron');
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  btn.classList.toggle('collapsed', !collapsed);
});

// ── Render loop ────────────────────────────────────────────────────────────

function resizeCanvas() {
  const dpr = devicePixelRatio || 1;
  const w = Math.floor(innerWidth * dpr), h = Math.floor(innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
}

let frameCount = 0;

function loop() {
  requestAnimationFrame(loop);
  if (video.readyState < 2 || W === 0) return;
  resizeCanvas();

  // Upload video frame (no UNPACK_FLIP_Y — we correct in the copy blit shader)
  gl.bindTexture(gl.TEXTURE_2D, inputTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);

  const ditherInt = opts.ditherMode === 'nearest' ? 1 : 0;

  // Extract palette every 6 frames when smart palette is on
  if (opts.smartPalette && frameCount % 6 === 0) {
    extractPalette(video, opts.paletteSize);
  }
  frameCount++;

  // 1. Dither into pingFbo
  if (opts.smartPalette) {
    gl.useProgram(adaptiveProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, inputTex);
    gl.uniform1i(gl.getUniformLocation(adaptiveProg, 'u_image'), 0);
    gl.uniform2f(gl.getUniformLocation(adaptiveProg, 'u_resolution'), W, H);
    gl.uniform1i(gl.getUniformLocation(adaptiveProg, 'u_ditherMode'), ditherInt);
    gl.uniform1i(gl.getUniformLocation(adaptiveProg, 'u_paletteCount'), paletteCount);
    gl.uniform1i(gl.getUniformLocation(adaptiveProg, 'u_palette'), 1);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, paletteTex);
    gl.bindFramebuffer(gl.FRAMEBUFFER, pingFbo);
    gl.viewport(0, 0, W, H);
    bindQuad(adaptiveProg);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else {
    runPass(ditherProg, inputTex, pingFbo, prog => {
      gl.uniform1i(gl.getUniformLocation(prog, 'u_image'), 0);
      gl.uniform2f(gl.getUniformLocation(prog, 'u_resolution'), W, H);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_paletteSize'), opts.paletteSize);
      gl.uniform1i(gl.getUniformLocation(prog, 'u_ditherMode'), ditherInt);
    });
  }

  // 2. Automaton iterations
  let srcTex = pingTex, dstFbo = pongFbo;
  for (let i = 0; i < opts.iterations; i++) {
    runPass(automatonProg, srcTex, dstFbo, prog => {
      gl.uniform1i(gl.getUniformLocation(prog, 'u_state'), 0);
      gl.uniform2f(gl.getUniformLocation(prog, 'u_resolution'), W, H);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_random'), Math.random());
    });
    if (srcTex === pingTex) { srcTex = pongTex; dstFbo = pingFbo; }
    else                     { srcTex = pingTex; dstFbo = pongFbo; }
  }

  // 3. Blit to screen
  gl.useProgram(copyProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.uniform1i(gl.getUniformLocation(copyProg, 'u_tex'), 0);
  gl.uniform2f(gl.getUniformLocation(copyProg, 'u_canvasSize'), canvas.width, canvas.height);
  gl.uniform2f(gl.getUniformLocation(copyProg, 'u_videoSize'), W, H);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  bindQuad(copyProg);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
</script>
